name: Benchmarks

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      run-windows-watch:
        description: Run the bounded Windows watch preflight
        required: true
        default: false
        type: boolean
      input-source:
        description: Use provisional refs or a previously uploaded campaign artifact
        required: true
        default: ref
        type: choice
        options:
          - ref
          - artifact
      base-ref:
        description: Base ref for provisional Windows watch inputs
        required: false
        default: origin/main
        type: string
      candidate-ref:
        description: Candidate ref for provisional Windows watch inputs
        required: false
        default: HEAD
        type: string
      artifact-run-id:
        description: Run containing a frozen campaign artifact
        required: false
        type: string
      artifact-name:
        description: Frozen campaign artifact name
        required: false
        type: string
      campaign-id:
        description: Frozen watch campaign ID
        required: false
        type: string
      measurement-mode:
        description: Preflight by default; final rejects provisional inputs
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - final
      probe-backend:
        description: Candidate observer backend probe
        required: true
        default: both
        type: choice
        options:
          - auto
          - native
          - chokidar
          - both

env:
  SKIP_INSTALL_SIMPLE_GIT_HOOKS: "1"

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark scripts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bootstrap benchmark
        run: |
          mkdir -p benchmark-results
          bun run bench:bootstrap-load | tee benchmark-results/bootstrap-load.txt

      - name: Run highlight prefetch benchmark
        run: |
          bun run bench:highlight-prefetch | tee benchmark-results/highlight-prefetch.txt

      - name: Run large stream benchmark
        run: |
          bun run bench:large-stream | tee benchmark-results/large-stream.txt

      - name: Publish benchmark summary
        run: |
          {
            echo '## Benchmark results'
            echo
            for file in benchmark-results/*.txt; do
              echo "### $(basename "$file")"
              echo '```text'
              cat "$file"
              echo '```'
              echo
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results/*.txt
          if-no-files-found: error

  windows-watch:
    name: Windows watch preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run-windows-watch
    uses: ./.github/workflows/watch-benchmark-host.yml
    with:
      input-source: ${{ inputs['input-source'] }}
      base-ref: ${{ inputs['base-ref'] }}
      candidate-ref: ${{ inputs['candidate-ref'] }}
      artifact-run-id: ${{ inputs['artifact-run-id'] }}
      artifact-name: ${{ inputs['artifact-name'] }}
      campaign-id: ${{ inputs['campaign-id'] }}
      measurement-mode: ${{ inputs['measurement-mode'] }}
      probe-backend: ${{ inputs['probe-backend'] }}
