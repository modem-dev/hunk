name: Benchmarks

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      run-windows-watch:
        description: Run the bounded Windows watch preflight
        required: true
        default: false
        type: boolean
      input-source:
        description: Use provisional refs or a previously uploaded campaign artifact
        required: true
        default: ref
        type: choice
        options:
          - ref
          - artifact
      base-ref:
        description: Base ref for provisional Windows watch inputs
        required: false
        default: origin/main
        type: string
      candidate-ref:
        description: Candidate ref for provisional Windows watch inputs
        required: false
        default: HEAD
        type: string
      artifact-run-id:
        description: Run containing a frozen campaign artifact
        required: false
        type: string
      artifact-name:
        description: Frozen campaign artifact name
        required: false
        type: string
      campaign-id:
        description: Frozen watch campaign ID
        required: false
        type: string
      measurement-mode:
        description: Preflight by default; final rejects provisional inputs
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - final
      probe-backend:
        description: Candidate observer backend probe
        required: true
        default: both
        type: choice
        options:
          - auto
          - native
          - chokidar
          - both

env:
  SKIP_INSTALL_SIMPLE_GIT_HOOKS: "1"

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark scripts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bootstrap benchmark
        run: |
          mkdir -p benchmark-results
          bun run bench:bootstrap-load | tee benchmark-results/bootstrap-load.txt

      - name: Run highlight prefetch benchmark
        run: |
          bun run bench:highlight-prefetch | tee benchmark-results/highlight-prefetch.txt

      - name: Run large stream benchmark
        run: |
          bun run bench:large-stream | tee benchmark-results/large-stream.txt

      - name: Publish benchmark summary
        run: |
          {
            echo '## Benchmark results'
            echo
            for file in benchmark-results/*.txt; do
              echo "### $(basename "$file")"
              echo '```text'
              cat "$file"
              echo '```'
              echo
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results/*.txt
          if-no-files-found: error

  windows-watch:
    name: Windows watch preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run-windows-watch
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      BUN_VERSION: 1.3.14
      INPUT_SOURCE: ${{ inputs['input-source'] }}
      BASE_REF: ${{ inputs['base-ref'] }}
      CANDIDATE_REF: ${{ inputs['candidate-ref'] }}
      CAMPAIGN_ID: ${{ inputs['campaign-id'] }}
      CAMPAIGN_ARTIFACT_NAME: ${{ inputs['artifact-name'] }}
      CAMPAIGN_ARTIFACT_RUN_ID: ${{ inputs['artifact-run-id'] }}
      MEASUREMENT_MODE: ${{ inputs['measurement-mode'] }}
      PROBE_BACKEND: ${{ inputs['probe-backend'] }}
    steps:
      - name: Disable automatic CRLF conversion
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Check out harness bootstrap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install packaging Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Validate dispatch inputs
        shell: pwsh
        run: |
          if ($env:INPUT_SOURCE -eq "artifact") {
            if ($env:CAMPAIGN_ID -notmatch '^watch-\d{8}T\d{6}Z-b[a-f0-9]{8}-h[a-f0-9]{8}$') {
              throw "Invalid campaign ID"
            }
            if ($env:CAMPAIGN_ARTIFACT_RUN_ID -notmatch '^\d+$') { throw "Invalid artifact run ID" }
            if ($env:CAMPAIGN_ARTIFACT_NAME -notmatch '^[A-Za-z0-9._-]+$') {
              throw "Invalid artifact name"
            }
          } else {
            foreach ($ref in @($env:BASE_REF, $env:CANDIDATE_REF)) {
              if ($ref -notmatch '^[A-Za-z0-9._/-]+$' -or $ref.Contains('..')) {
                throw "Invalid provisional Git ref"
              }
            }
            if ($env:MEASUREMENT_MODE -ne "preflight") {
              throw "Ref inputs are explicitly preflight-only"
            }
          }

      - name: Download campaign artifact
        if: inputs['input-source'] == 'artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          run-id: ${{ env.CAMPAIGN_ARTIFACT_RUN_ID }}
          name: ${{ env.CAMPAIGN_ARTIFACT_NAME }}
          path: campaigns/${{ env.CAMPAIGN_ID }}

      - name: Materialize exact artifact harness
        if: inputs['input-source'] == 'artifact'
        shell: pwsh
        run: |
          $campaign = (Resolve-Path "campaigns/$env:CAMPAIGN_ID").Path
          $manifest = Get-Content -Raw -LiteralPath "$campaign/campaign-manifest.json" | ConvertFrom-Json
          $harness = "$campaign/harness"
          if (Test-Path -LiteralPath $harness) { throw "Harness destination already exists" }
          New-Item -ItemType Directory -Path $harness | Out-Null
          git -C $harness init --quiet
          git -C $harness config core.autocrlf false
          git -C $harness fetch --quiet --no-tags "$campaign/inputs/hunk.bundle" $manifest.bundleRefs.harness
          if ((git -C $harness rev-parse 'FETCH_HEAD^{commit}').Trim() -ne $manifest.revisions.harness.sourceSha) {
            throw "Campaign harness SHA mismatch"
          }
          git -C $harness checkout --quiet --detach FETCH_HEAD
          "CAMPAIGN_ROOT=$campaign" >> $env:GITHUB_ENV
          "HARNESS_ROOT=$harness" >> $env:GITHUB_ENV

      - name: Select ref harness
        if: inputs['input-source'] == 'ref'
        shell: pwsh
        run: |
          "HARNESS_ROOT=$env:GITHUB_WORKSPACE" >> $env:GITHUB_ENV

      - name: Install exact harness dependencies
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:HARNESS_ROOT
          & bun install --frozen-lockfile

      - name: Prepare provisional campaign inputs
        if: inputs['input-source'] == 'ref'
        shell: pwsh
        run: |
          $id = (& bun "$env:HARNESS_ROOT/benchmarks/watch/prepare-preflight.ts" `
            --repo $env:HARNESS_ROOT `
            --campaigns-dir "$env:GITHUB_WORKSPACE/campaigns" `
            --base-ref $env:BASE_REF `
            --candidate-ref $env:CANDIDATE_REF).Trim()
          if ($LASTEXITCODE -ne 0) { throw "Provisional campaign preparation failed" }
          "CAMPAIGN_ID=$id" >> $env:GITHUB_ENV
          "CAMPAIGN_ROOT=$env:GITHUB_WORKSPACE/campaigns/$id" >> $env:GITHUB_ENV

      - name: Focused Windows correctness tests
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:HARNESS_ROOT
          $tests = @(
            Get-ChildItem -LiteralPath benchmarks/watch -Filter *.test.ts | Sort-Object FullName
            Get-Item src/core/watch.test.ts
            Get-Item src/core/watchController.test.ts
            Get-Item src/core/watchObserver.test.ts
            Get-Item src/core/watchObserver.fs.test.ts
            Get-Item src/core/watchPlan.test.ts
          )
          foreach ($test in $tests) {
            Write-Output "=== $($test.FullName) ==="
            & bun test $test.FullName
            if ($LASTEXITCODE -ne 0) { throw "Windows test failed or crashed: $($test.FullName)" }
          }

      - name: Read-only host preflight
        shell: pwsh
        run: |
          $hostDir = "$env:CAMPAIGN_ROOT/hosts/windows-x64-gha"
          New-Item -ItemType Directory -Force -Path $hostDir | Out-Null
          & bun "$env:HARNESS_ROOT/benchmarks/watch/host-preflight.ts" `
            --host-id windows-x64-gha --bun (Get-Command bun).Source | `
            Set-Content -Encoding utf8 "$hostDir/host-preflight.json"

      - name: Build exact revisions and provenance
        shell: pwsh
        run: |
          & bun "$env:HARNESS_ROOT/benchmarks/watch/build-host.ts" `
            --campaign-root $env:CAMPAIGN_ROOT `
            --host-id windows-x64-gha `
            --bun (Get-Command bun).Source

      - name: Run common campaign command
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -LiteralPath "$env:CAMPAIGN_ROOT/campaign-manifest.json" | ConvertFrom-Json
          if ($env:MEASUREMENT_MODE -eq "final") {
            if ($manifest.preflightOnly) { throw "Preflight-only inputs cannot run final cells" }
            & bun "$env:HARNESS_ROOT/benchmarks/watch/run.ts" `
              --config "$env:CAMPAIGN_ROOT/hosts/windows-x64-gha/campaign.json"
          } else {
            & bun "$env:HARNESS_ROOT/benchmarks/watch/run.ts" `
              --config "$env:CAMPAIGN_ROOT/hosts/windows-x64-gha/campaign.json" --preflight
          }

      - name: Run forced candidate backend probes
        shell: pwsh
        run: |
          $probeDir = "$env:CAMPAIGN_ROOT/hosts/windows-x64-gha/observer-probes"
          New-Item -ItemType Directory -Force -Path $probeDir | Out-Null
          $repo = "$env:CAMPAIGN_ROOT/work/fixtures/little-repo"
          $backends = if ($env:PROBE_BACKEND -eq "both") { @("auto", "native", "chokidar") } else { @($env:PROBE_BACKEND) }
          foreach ($backend in $backends) {
            $output = & bun "$env:HARNESS_ROOT/benchmarks/watch/observer-probe.ts" `
              --repo $repo --timeout-ms 30000 --backend $backend
            if ($LASTEXITCODE -ne 0) { throw "Observer probe failed for $backend" }
            $output | Set-Content -Encoding utf8 "$probeDir/$backend.json"
          }

      - name: Record workflow provenance
        shell: pwsh
        run: |
          @{
            schemaVersion = 1
            preflight = ($env:MEASUREMENT_MODE -eq "preflight")
            inputSource = $env:INPUT_SOURCE
            hostId = "windows-x64-gha"
            processArchitecture = [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture.ToString()
            osArchitecture = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
            runnerImage = $env:ImageOS
            gitSha = $env:GITHUB_SHA
          } | ConvertTo-Json | Set-Content -Encoding utf8 "$env:CAMPAIGN_ROOT/hosts/windows-x64-gha/workflow-provenance.json"

      - name: Upload Windows campaign evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-x64-watch-results-${{ github.run_id }}
          path: |
            campaigns/*/campaign-manifest.json
            campaigns/*/inputs/SHA256SUMS
            campaigns/*/hosts/windows-x64-gha
            campaigns/*/raw/windows-x64-gha
            campaigns/*/summaries/windows-x64-gha.md
          if-no-files-found: error
          retention-days: 30
